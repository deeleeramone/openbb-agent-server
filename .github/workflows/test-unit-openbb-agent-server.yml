name: 🧪 test openbb-agent-server

# PR + push CI for the standalone openbb-agent-server repository.
#
# Three independent jobs run in parallel — there is no build-time data
# generation, so the wheel build, the lint pass, and the cross-platform
# test matrix each install from source and need no shared artifact.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Cancel in-flight matrix runs when a new commit lands on the same PR.
  group: test-openbb-agent-server-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v6

      - name: Build sdist + wheel
        run: uv build

      - uses: actions/upload-artifact@v5
        with:
          name: openbb-agent-server-dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  lint:
    name: Lint (ruff + ty)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          # 3.13+ so the workspace-mcp optional dep (requires-python >=3.13)
          # is installable and ty can resolve all imports.
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v6

      - name: Install openbb-agent-server in editable mode (+ dev group)
        run: |
          uv pip install --system -e ".[all]"
          uv pip install --system --group dev

      - name: ruff check
        run: ruff check openbb_agent_server tests

      - name: ruff format --check
        run: ruff format --check openbb_agent_server tests

      - name: ty check
        run: ty check openbb_agent_server

  test:
    name: Test (${{ matrix.os }} / Python ${{ matrix.python_version }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: full sweep across the supported Python range.
          - { os: ubuntu-latest, python_version: "3.11" }
          - { os: ubuntu-latest, python_version: "3.12" }
          - { os: ubuntu-latest, python_version: "3.13" }
          - { os: ubuntu-latest, python_version: "3.14" }
          # macOS arm64 (Apple Silicon)
          - { os: macos-latest, python_version: "3.11" }
          - { os: macos-latest, python_version: "3.13" }
          # macOS x86_64 (Intel)
          - { os: macos-15-intel, python_version: "3.11" }
          - { os: macos-15-intel, python_version: "3.13" }
          # Windows
          - { os: windows-latest, python_version: "3.11" }
          - { os: windows-latest, python_version: "3.13" }
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      # Bootstrap Python is only here to install ``uv``.
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6

      - name: Install Python ${{ matrix.python_version }} via uv
        # ``actions/setup-python``'s macOS interpreters are built
        # WITHOUT ``--enable-loadable-sqlite-extensions``, so
        # ``sqlite3.Connection.enable_load_extension`` is missing and
        # ``sqlite-vec`` cannot load. uv installs a
        # python-build-standalone interpreter that has loadable SQLite
        # extensions enabled on every OS.
        run: uv python install "${{ matrix.python_version }}"

      - name: Create venv + install openbb-agent-server (+ dev group)
        # The dev group brings pywry, so the ACP shim tests run instead
        # of skipping.
        run: |
          uv venv --python "${{ matrix.python_version }}"
          uv pip install -e ".[all]"
          uv pip install --group dev

      - name: Cache apt packages (Linux)
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-ffmpeg-${{ runner.os }}-${{ runner.arch }}

      - name: Cache Homebrew downloads (macOS)
        if: runner.os == 'macOS'
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-ffmpeg-${{ runner.os }}-${{ runner.arch }}

      - name: Install ffmpeg
        run: |
          case "$RUNNER_OS" in
            Linux)   sudo apt-get update && sudo apt-get install -y ffmpeg ;;
            macOS)   brew install --force ffmpeg ;;
            Windows) choco install ffmpeg --no-progress --yes ;;
          esac

      - name: Run unit tests
        # The 100% coverage gate runs on every OS — Linux, macOS and
        # Windows must all cover every line.
        run: |
          uv run --no-sync pytest tests \
            --cov=openbb_agent_server --cov-report=term-missing \
            --cov-fail-under=100
